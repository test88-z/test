name: PR test

on:
  pull_request_target:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: run script
        run: bash x.sh
        env:
          TOKEN: ${{ secrets.DEMO_TOKEN }}
